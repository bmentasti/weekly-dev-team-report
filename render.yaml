# Render Blueprint — DevMetrics (weekly-dev-team-report)
# Docs: https://render.com/docs/blueprint-spec
#
# Uso:
#   1. Commit + push de este archivo al repo.
#   2. En Render: New → Blueprint → seleccioná este repo.
#   3. Render crea el Postgres y el web service, e inyecta DATABASE_URL solo.
#   4. Completá los envVars marcados como `sync: false` (te los va a pedir):
#        - ENCRYPTION_KEY  → 64 hex (generá: openssl rand -hex 32)
#        - NEXTAUTH_URL    → https://<tu-servicio>.onrender.com
#        - CRON_SECRET     → opcional, solo si usás envíos programados
#      NEXTAUTH_SECRET se genera solo (generateValue).

databases:
  - name: devmetrics-db
    databaseName: weekly_dev_report
    plan: free

services:
  - type: web
    name: weekly-dev-team-report
    runtime: node
    plan: free
    region: oregon            # cambialo si preferís otra región
    branch: main
    # NEXT_PHASE evita que la validación de entorno corra durante el build
    # (los secrets de runtime todavía no están cargados en esa fase).
    buildCommand: npm ci && npx prisma db push && NEXT_PHASE=phase-production-build npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devmetrics-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true       # Render genera un secreto aleatorio
      - key: ENCRYPTION_KEY
        sync: false               # pegá 64 hex — openssl rand -hex 32
      - key: NEXTAUTH_URL
        sync: false               # https://<tu-servicio>.onrender.com
      - key: NODE_VERSION
        value: "20"
      - key: CRON_SECRET
        sync: false               # opcional
